<!DOCTYPE html>
<html>
<head>
<title>Kerala Legislative Assembly Election 2026</title>

<style>
body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; }

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  border-bottom: 1px solid #eee;
}
.logo { height: 40px; }

/* SEATS */
.seatbar {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 15px;
  background: #fafafa;
}
.party-box {
  padding: 10px 20px;
  border-radius: 10px;
  color: white;
  font-weight: bold;
}
.ldf-box { background: #e53935; }
.udf-box { background: #1e88e5; }
.nda-box { background: #fb8c00; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  padding: 20px;
  gap: 15px;
}

.card {
  border: 1px solid #eee;
  border-radius: 12px;
  padding: 15px;
  background: #fafafa;
}

/* PARTY COLORS */
.ldf { color: #e53935; font-weight: bold; }
.udf { color: #1e88e5; font-weight: bold; }
.nda { color: #fb8c00; font-weight: bold; }

/* LEADING COLORS */
.leading-ldf { color: #e53935; font-weight: bold; }
.leading-udf { color: #1e88e5; font-weight: bold; }
.leading-nda { color: #fb8c00; font-weight: bold; }

.trailing { color: #999; }

/* CARD HIGHLIGHT */
.highlight-ldf { border: 2px solid #e53935; }
.highlight-udf { border: 2px solid #1e88e5; }
.highlight-nda { border: 2px solid #fb8c00; }

/* TICKER */
.ticker {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  color: white;
  height: 40px;
  display: flex;
  align-items: center;
}

.ticker-label {
  background: red;
  padding: 0 20px;
  font-weight: bold;
  height: 100%;
  display: flex;
  align-items: center;
}

.ticker-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.ticker-text {
  position: absolute;
  white-space: nowrap;
  animation: scroll 35s linear infinite;
  font-weight: bold;
}

.ldf-tick { color: #e53935; }
.udf-tick { color: #1e88e5; }
.nda-tick { color: #fb8c00; }

@keyframes scroll {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<div class="header">
  <img class="logo" src="https://maktoobmedia.com/assets/main/maktoob/img/logo.svg">
  <div><b>KERALA LEGISLATIVE ASSEMBLY ELECTION 2026</b></div>
</div>

<div class="seatbar" id="seats"></div>
<div class="grid" id="results"></div>

<div class="ticker">
  <div class="ticker-label">LEADS</div>
  <div class="ticker-wrap">
    <div class="ticker-text" id="ticker"></div>
  </div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyPv2d4xyyVrT7ZGpw-v_Wjbl02oW04Xymoaco-Hedvs6t8rkQeuDuwAumCSh2u10ichA/exec";

let fullData = [];
let startIndex = 0;
const VISIBLE_COUNT = 12;

function render() {

  if (!fullData.length) {
    document.getElementById("results").innerHTML = "No data";
    return;
  }

  let html = "";
  let ticker = "";
  let ldf=0, udf=0, nda=0;

  // SORT LATEST FIRST
  fullData.sort((a,b)=> new Date(b["Last Updated"]||0) - new Date(a["Last Updated"]||0));

  // TOTAL SEATS
  fullData.forEach(row=>{
    let l=+row["LDF Votes"], u=+row["UDF Votes"], n=+row["NDA Votes"];
    if(!(l===0 && u===0 && n===0)){
      let leader="LDF", max=l;
      if(u>max){leader="UDF";max=u;}
      if(n>max){leader="NDA";}
      if(leader==="LDF") ldf++;
      if(leader==="UDF") udf++;
      if(leader==="NDA") nda++;
    }
  });

  let visible = fullData.slice(startIndex, startIndex+VISIBLE_COUNT);

  visible.forEach(row=>{

    let l=+row["LDF Votes"], u=+row["UDF Votes"], n=+row["NDA Votes"];
    let leader="Counting";

    if(!(l===0 && u===0 && n===0)){
      leader="LDF"; let max=l;
      if(u>max){leader="UDF";max=u;}
      if(n>max){leader="NDA";}
    }

    let leadCandidate =
      leader==="LDF"?row["LDF Candidate"]:
      leader==="UDF"?row["UDF Candidate"]:
      leader==="NDA"?row["NDA Candidate"]:"";

    let partyClass =
      leader==="LDF"?"ldf-tick":
      leader==="UDF"?"udf-tick":
      leader==="NDA"?"nda-tick":"";

    ticker += `
      <span>
        ${row.Constituency}:
        ${
          leader==="Counting"
          ? "<span style='color:gray'>Counting Not Started</span>"
          : `<span class="${partyClass}">${leader}</span> (${leadCandidate})`
        }
      </span> &nbsp; | &nbsp;
    `;

    function cls(p){
      if(p!==leader) return "trailing";
      return leader==="LDF"?"leading-ldf":
             leader==="UDF"?"leading-udf":
             "leading-nda";
    }

    let highlight =
      leader==="LDF"?"highlight-ldf":
      leader==="UDF"?"highlight-udf":
      leader==="NDA"?"highlight-nda":"";

    html += `
    <div class="card ${highlight}">
      <div><b>${row.Constituency}</b></div>
      <div style="font-size:12px;color:gray">${row.District}</div>

      <p class="ldf ${cls("LDF")}">LDF: ${l} (${row["LDF Candidate"]})</p>
      <p class="udf ${cls("UDF")}">UDF: ${u} (${row["UDF Candidate"]})</p>
      <p class="nda ${cls("NDA")}">NDA: ${n} (${row["NDA Candidate"]})</p>

      <div>
        ${leader==="Counting"
          ? "<span class='trailing'>Counting Not Started</span>"
          : `<span class="${cls(leader)}">Leading: ${leader}</span>`
        }
      </div>
    </div>
    `;
  });

  document.getElementById("results").innerHTML = html;

  document.getElementById("seats").innerHTML =
    `<div class="party-box ldf-box">LDF ${ldf}</div>
     <div class="party-box udf-box">UDF ${udf}</div>
     <div class="party-box nda-box">NDA ${nda}</div>`;

  document.getElementById("ticker").innerHTML =
    ticker ? ticker + ticker : "Counting yet to begin...";
}

// LOAD
function loadData(){
  fetch(API)
  .then(r=>r.json())
  .then(d=>{ fullData=d; render(); })
  .catch(()=> document.getElementById("results").innerHTML="⚠️ Error loading");
}

// ROTATE
setInterval(()=>{
  startIndex+=VISIBLE_COUNT;
  if(startIndex>=fullData.length) startIndex=0;
  render();
},30000);

// REFRESH
setInterval(loadData,10000);

loadData();

</script>
</body>
</html>
