<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #f5f6fa;
}

/* HEADER */
.header {
  text-align: center;
  padding: 15px;
  background: white;
  border-bottom: 1px solid #eee;
}

.logo { height: 40px; }

/* CARD */
.container {
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

/* LOGIN BOX */
.login-box {
  background: white;
  padding: 25px;
  border-radius: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  width: 300px;
  text-align: center;
}

/* DASHBOARD CARD */
.card {
  display: none;
  background: white;
  padding: 25px;
  border-radius: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  width: 320px;
  text-align: center;
}

/* INPUTS */
select, input {
  width: 90%;
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BUTTON */
button {
  padding: 10px 20px;
  background: black;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* PREVIEW */
.preview {
  margin-top: 15px;
  background: #fafafa;
  padding: 10px;
  border-radius: 8px;
}

/* STATUS */
.success { color: green; }
.error { color: red; }

</style>

</head>

<body oncontextmenu="return false">

<div class="header">
  <img class="logo" src="https://maktoobmedia.com/assets/main/maktoob/img/logo.svg">
  <h3>Admin Dashboard</h3>
</div>

<div class="container">

  <!-- LOGIN -->
  <div class="login-box" id="loginBox">
    <h3>Admin Login</h3>
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="login()">Login</button>
    <div id="loginMsg" class="error"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="card" id="dashboard">

    <h3>Update Seats</h3>

    <select id="state"></select>
    <select id="alliance"></select>

    <input type="number" id="seats" placeholder="Enter seats">

    <button onclick="update()">Update</button>

    <div id="msg" class="success"></div>

    <div id="preview" class="preview"></div>

  </div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyDLq11aLNLLWBCvZnch8DhbjcqF96GYl-mR1w9f2gIC_qjjFNOwYmWQ_twDh2N8jRs/exec";

/* 🔐 CHANGE PASSWORD HERE */
const ADMIN_PASSWORD = "12345";

let dataStore = [];

/* LOGIN FUNCTION */
function login(){
  let pass = document.getElementById("password").value;

  if(pass === ADMIN_PASSWORD){
    loginBox.style.display = "none";
    dashboard.style.display = "block";
    loadData();
  } else {
    loginMsg.innerText = "❌ Wrong password";
  }
}

/* LOAD DATA */
function loadData(){
  fetch(API)
  .then(res => res.json())
  .then(data => {

    dataStore = data;

    let states = [...new Set(data.map(x=>x.State))];
    let alliances = [...new Set(data.map(x=>x.Alliance))];

    state.innerHTML = "";
    alliance.innerHTML = "";

    states.forEach(x=>{
      state.innerHTML += `<option>${x}</option>`;
    });

    alliances.forEach(x=>{
      alliance.innerHTML += `<option>${x}</option>`;
    });

    updatePreview();
  });
}

/* PREVIEW */
function updatePreview(){
  let st = state.value;
  let al = alliance.value;

  let row = dataStore.find(r => r.State===st && r.Alliance===al);

  if(row){
    preview.innerHTML = `<b>${st}</b><br>${al}: ${row.Seats}`;
  }
}

/* LISTENERS */
state.addEventListener("change", updatePreview);
alliance.addEventListener("change", updatePreview);

/* UPDATE */
function update(){
  let payload = {
    state: state.value,
    alliance: alliance.value,
    seats: seats.value
  };

  fetch(API,{
    method:"POST",
    body: JSON.stringify(payload)
  })
  .then(()=>{
    msg.innerText = "✅ Updated successfully";
    loadData();
  })
  .catch(()=>{
    msg.innerText = "❌ Error updating";
  });
}

/* ❌ BLOCK INSPECT SHORTCUTS (basic deterrent only) */
document.onkeydown = function(e) {
  if (
    e.keyCode == 123 || // F12
    (e.ctrlKey && e.shiftKey && e.keyCode == 73) || // Ctrl+Shift+I
    (e.ctrlKey && e.keyCode == 85) // Ctrl+U
  ) {
    return false;
  }
};

</script>

</body>
</html>
