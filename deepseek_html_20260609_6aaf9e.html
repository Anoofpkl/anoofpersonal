        { text: "How many reports did the National Commission on Farmers produce?", options: ["Three", "Four", "Five", "Six"], correct: "Five" },
        { text: "The National Policy for Farmers was approved by the Government of India in:", options: ["2000", "2004", "2007", "2010"], correct: "2007" },
        { text: "The National Policy for Farmers is based on the draft prepared by:", options: ["CACP", "National Commission on Farmers (NCF)", "ICAR", "Ministry of Finance"], correct: "National Commission on Farmers (NCF)" },
        { text: "Which of the following is a practical activity suggested in the PDF?", options: ["Collect data on subsidies from block development officer", "Visit an agricultural research station on a field day", "Visit Department of Agriculture to list training programmes", "All of the above"], correct: "All of the above" },
        { text: "According to the PDF, education and training are the foundation for:", options: ["Only production", "Prosperous production, distribution, and consumption for nourishment", "Only export", "Only marketing"], correct: "Prosperous production, distribution, and consumption for nourishment" },
        { text: "The phrase 'unaccountable cost' in the context of subsidies refers to:", options: ["Costs that are hidden", "The cost of educating farmers which is not measurable as specific units", "Illegal subsidies", "Costs paid by foreign governments"], correct: "The cost of educating farmers which is not measurable as specific units" }
    ];

    const TOTAL = QUESTIONS_DATA.length;
    let userSelections = new Array(TOTAL).fill(null);      // stores selected answer string
    let answerStatus = new Array(TOTAL).fill(null);        // true=correct, false=wrong, null=not submitted
    let currentIndex = 0;

    // DOM elements
    const questionTextEl = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const feedbackDiv = document.getElementById("feedbackMessage");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const submitBtn = document.getElementById("submitBtn");
    const resetBtn = document.getElementById("resetAllBtn");
    const currentIdxSpan = document.getElementById("currentIdxDisplay");
    const totalQSpan = document.getElementById("totalQDisplay");
    const scoreSpan = document.getElementById("scoreDisplay");
    const attemptedSpan = document.getElementById("attemptedDisplay");
    const totalPossibleSpan = document.getElementById("totalPossible");
    totalPossibleSpan.innerText = TOTAL;
    totalQSpan.innerText = TOTAL;

    function updateStats() {
        let correctCount = 0;
        let attempted = 0;
        for (let i = 0; i < TOTAL; i++) {
            if (answerStatus[i] === true) correctCount++;
            if (answerStatus[i] !== null) attempted++;
        }
        scoreSpan.innerText = correctCount;
        attemptedSpan.innerText = attempted;
    }

    function renderCurrentQuestion() {
        const q = QUESTIONS_DATA[currentIndex];
        questionTextEl.innerText = q.text;
        document.getElementById("qNumLabel").innerText = `Question ${currentIndex+1}`;
        currentIdxSpan.innerText = currentIndex+1;

        const savedSelection = userSelections[currentIndex];
        let optsHtml = "";
        q.options.forEach((opt, idx) => {
            const isChecked = (savedSelection === opt);
            const checkedAttr = isChecked ? 'checked' : '';
            optsHtml += `
                <div class="option-item ${isChecked ? 'selected' : ''}" data-opt-val="${opt.replace(/"/g, '&quot;')}">
                    <input type="radio" name="quizOption" id="opt_${idx}" value="${opt.replace(/"/g, '&quot;')}" ${checkedAttr}>
                    <label for="opt_${idx}">${opt}</label>
                </div>
            `;
        });
        optionsContainer.innerHTML = optsHtml;

        // attach click for radio styling
        document.querySelectorAll('.option-item').forEach(div => {
            const radio = div.querySelector('input[type="radio"]');
            div.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') {
                    radio.checked = true;
                    const changeEv = new Event('change', { bubbles: true });
                    radio.dispatchEvent(changeEv);
                }
            });
            radio.addEventListener('change', () => {
                document.querySelectorAll('.option-item').forEach(d => d.classList.remove('selected'));
                if (radio.checked) div.classList.add('selected');
                // update temporary selection variable when radio changes (but not submitted yet)
                const selectedVal = radio.value;
                userSelections[currentIndex] = selectedVal;
            });
        });

        // Show feedback if already answered
        if (answerStatus[currentIndex] !== null) {
            const isCorrect = answerStatus[currentIndex];
            const correctAns = QUESTIONS_DATA[currentIndex].correct;
            feedbackDiv.style.display = "block";
            if (isCorrect) {
                feedbackDiv.className = "feedback correct-feedback";
                feedbackDiv.innerHTML = `✅ Correct!`;
            } else {
                feedbackDiv.className = "feedback wrong-feedback";
                feedbackDiv.innerHTML = `❌ Wrong. Correct answer: ${correctAns}`;
            }
        } else {
            feedbackDiv.style.display = "none";
            feedbackDiv.innerHTML = "";
        }
        updateStats();
    }

    function submitCurrent() {
        const selectedRadio = document.querySelector('input[name="quizOption"]:checked');
        if (!selectedRadio) {
            feedbackDiv.style.display = "block";
            feedbackDiv.className = "feedback wrong-feedback";
            feedbackDiv.innerHTML = "⚠️ Please select an option before submitting.";
            return;
        }
        const selectedAnswer = selectedRadio.value;
        const currentQ = QUESTIONS_DATA[currentIndex];
        const isAnsCorrect = (selectedAnswer === currentQ.correct);
        // store selection & status
        userSelections[currentIndex] = selectedAnswer;
        answerStatus[currentIndex] = isAnsCorrect;
        // show feedback
        feedbackDiv.style.display = "block";
        if (isAnsCorrect) {
            feedbackDiv.className = "feedback correct-feedback";
            feedbackDiv.innerHTML = `✅ Correct!`;
        } else {
            feedbackDiv.className = "feedback wrong-feedback";
            feedbackDiv.innerHTML = `❌ Wrong. Correct answer: ${currentQ.correct}`;
        }
        updateStats();
        renderCurrentQuestion();   // re-render to persist selection highlight & keep feedback
    }

    function nextQuestion() {
        if (currentIndex < TOTAL - 1) {
            currentIndex++;
            renderCurrentQuestion();
        } else {
            feedbackDiv.style.display = "block";
            feedbackDiv.className = "feedback";
            feedbackDiv.innerHTML = "🏁 You've completed all questions! Press Reset to try again.";
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
        } else {
            feedbackDiv.style.display = "block";
            feedbackDiv.className = "feedback";
            feedbackDiv.innerHTML = "📌 This is the first question.";
            setTimeout(() => {
                if (answerStatus[currentIndex] === null) feedbackDiv.style.display = "none";
            }, 1500);
        }
    }

    function resetQuiz() {
        userSelections = new Array(TOTAL).fill(null);
        answerStatus = new Array(TOTAL).fill(null);
        currentIndex = 0;
        updateStats();
        renderCurrentQuestion();
        feedbackDiv.style.display = "none";
        feedbackDiv.innerHTML = "";
    }

    submitBtn.addEventListener("click", submitCurrent);
    nextBtn.addEventListener("click", nextQuestion);
    prevBtn.addEventListener("click", prevQuestion);
    resetBtn.addEventListener("click", resetQuiz);

    // initial render
    renderCurrentQuestion();
    updateStats();
</script>
</body>
</html>
